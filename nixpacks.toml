[phases.setup]
nixPkgs = ["python313"]

[phases.install]
cmds = [
    "pip install uv",
    "uv sync --no-dev"
]

[phases.build]
cmds = [
    "python manage.py collectstatic --noinput",
    "python manage.py migrate --noinput"
]

[start]
cmd = "gunicorn facility_manager.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --threads 2 --timeout 120"