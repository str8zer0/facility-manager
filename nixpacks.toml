[phases.setup]
nixPkgs = ["python313", "uv"]

[phases.install]
cmds = [
    "uv sync --no-dev"
]

[phases.build]
cmds = [
    "python manage.py collectstatic --noinput"
]

[start]
cmd = "python manage.py migrate --noinput && python manage.py create_default_admin && gunicorn facility_manager.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --threads 2 --timeout 120"
