{% extends "base.html" %}

{% block title %}Internal Server Error - 500{% endblock %}

{% block content %}
<div class="container py-5 my-5 text-center">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="mb-4">
                <i class="fas fa-server fa-5x text-danger opacity-50"></i>
            </div>
            <h1 class="display-1 fw-bold text-danger">500</h1>
            <h2 class="mb-4">Internal Server Error</h2>
            <p class="lead mb-5 text-muted">
                Something went wrong on our server. We are working to fix this as soon as possible.
            </p>
            <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
                <a href="{% url 'common:home' %}" class="btn btn-primary btn-lg px-4 gap-3">
                    <i class="fas fa-home me-2"></i>Go to Homepage
                </a>
                <a href="mailto:admin@example.com" class="btn btn-outline-secondary btn-lg px-4">
                    <i class="fas fa-envelope me-2"></i>Contact Support
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
