{% extends "base.html" %}

{% block title %}Delete Room - Facility Manager{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card border-0 shadow-sm border-top border-danger border-4">
                <div class="card-body p-4 text-center">
                    <div class="mb-4">
                        <i class="fas fa-exclamation-triangle text-danger fa-4x"></i>
                    </div>
                    <h3 class="card-title">Delete Room?</h3>
                    <p class="text-muted mb-4">
                        Are you sure you want to delete <strong>"{{ room.name }}"</strong> in <strong>"{{ room.building.name }}"</strong>?<br>
                        <span class="text-danger small">This action cannot be undone.</span>
                    </p>
                    
                    <form method="post">
                        {% csrf_token %}
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-danger">Yes, Delete Permanently</button>
                            <a href="{% url 'facilities:room_detail' room.pk %}" class="btn btn-outline-secondary">No, Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
