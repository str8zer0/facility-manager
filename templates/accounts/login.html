{% extends "base.html" %}

{% block title %}Login - MMS{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow border-0">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="fas fa-tools fa-3x text-primary mb-3"></i>
                        <h2 class="fw-bold">Welcome Back</h2>
                        <p class="text-muted">Login to your MMS account</p>
                    </div>

                    <form method="post" action="{% url 'accounts:login' %}">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="id_username" class="form-label">Email / Username</label>
                            <input type="text" name="username" class="form-control form-control-lg" id="id_username" placeholder="Enter your email" required>
                        </div>
                        <div class="mb-3">
                            <div class="d-flex justify-content-between align-items-center">
                                <label for="id_password" class="form-label">Password</label>
                            </div>
                            <input type="password" name="password" class="form-control form-control-lg" id="id_password" placeholder="Enter your password" required>
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg mt-3">Sign In</button>
                        </div>
                    </form>

                    <div class="text-center mt-4">
                        <p class="mb-0 text-muted">Don't have an account? <a href="{% url 'accounts:register' %}" class="text-primary text-decoration-none">Register</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
