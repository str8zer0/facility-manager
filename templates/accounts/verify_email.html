{% extends "base.html" %}

{% block title %}Verify Email - Facility Manager{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-5 text-center">
                    <div class="mb-4">
                        <i class="fas fa-envelope-open-text fa-4x text-primary"></i>
                    </div>
                    <h1 class="h3 mb-3 fw-bold">Email Verification</h1>
                    <p class="text-muted mb-4">
                        Processing your email verification request. Please wait while we confirm your account.
                    </p>
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
