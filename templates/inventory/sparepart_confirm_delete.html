{% extends "base.html" %}

{% block title %}Delete Spare Part: {{ part.name }}{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-5 text-center">
                    <div class="text-danger mb-4">
                        <i class="fas fa-exclamation-triangle fa-4x"></i>
                    </div>
                    <h1 class="h3 mb-3">Delete Spare Part?</h1>
                    <p class="text-muted mb-4">
                        Are you sure you want to delete <strong>{{ part.name }}</strong>?<br>
                        This will also remove all movement history for this part.
                    </p>
                    <form method="post">
                        {% csrf_token %}
                        <div class="d-grid gap-2 d-md-flex justify-content-md-center">
                            <a href="{% url 'inventory:sparepart_detail' part.pk %}" class="btn btn-outline-secondary px-4">
                                No, Cancel
                            </a>
                            <button type="submit" class="btn btn-danger px-4">
                                Yes, Delete Part
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
