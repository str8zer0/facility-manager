{% extends "base.html" %}

{% block title %}Delete Category{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card border-0 shadow-sm border-top border-danger border-4">
                <div class="card-body p-4 text-center">
                    <div class="mb-4 text-danger">
                        <i class="fas fa-exclamation-triangle fa-4x"></i>
                    </div>
                    <h1 class="h3 mb-3">Delete Category</h1>
                    <p class="lead mb-4">Are you sure you want to delete category "<strong>{{ category.name }}</strong>"?</p>
                    
                    <div class="alert alert-warning mb-4">
                        <i class="fas fa-info-circle me-1"></i>
                        Note: Assets assigned to this category will have their category set to <strong>None</strong>.
                    </div>

                    <form method="post">
                        {% csrf_token %}
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-danger btn-lg">
                                <i class="fas fa-trash me-1"></i> Yes, Delete Category
                            </button>
                            <a href="{% url 'assets:category_list' %}" class="btn btn-outline-secondary">
                                Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
